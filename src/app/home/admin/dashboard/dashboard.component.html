<div class="dashboard-container">
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <h1 class="header-title">Dashboard</h1>
            <!-- View Mode Selector -->
            <div class="header-controls">
                <select class="view-selector" (change)="onViewChange($event)">
                    <option value="truck-statistics">Truck Statistics</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="routes">Routes Analysis</option>
                    <option value="fuel">Fuel Management</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Child route content renders here -->
    <router-outlet></router-outlet>
</div>
